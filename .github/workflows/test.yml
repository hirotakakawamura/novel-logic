name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          echo "### Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce minimum coverage
        run: |
          total=$(awk '/^total:/ {gsub(/%/,"",$3); print $3}' coverage-summary.txt)
          min=80
          echo "Total coverage: ${total}% (minimum ${min}%)"
          awk -v t="$total" -v m="$min" 'BEGIN { if (t+0 < m+0) { print "coverage below threshold"; exit 1 } }'

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error

  lean-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Install elan
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build novel-logic
        run: go build -o bin/novel-logic ./cmd/novel-logic

      - name: Stage 2 check (momotaro-walkthrough)
        run: ./bin/novel-logic -C examples/momotaro-walkthrough check -q

      - name: Stage 2 check (momotaro)
        run: ./bin/novel-logic -C examples/momotaro check -q